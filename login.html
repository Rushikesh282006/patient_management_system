<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/plugins/choices.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                MediCare
            </a>
            <a href="index.html" class="btn-primary" style="text-decoration: none; padding: 0.8rem 2rem;"><i class="fas fa-arrow-left"></i><span class="hide-on-mobile" style="margin-left: 0.5rem;">Back to Home</span></a>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="hero-background">
            <div class="hero-circle circle-1" data-speed="2"></div>
            <div class="hero-circle circle-2" data-speed="3"></div>
        </div>
        
        <div class="auth-wrapper login-wrapper">
            <div class="auth-card">
                <h1 style="font-family: 'Crimson Pro', serif; font-size: 2.5rem; color: var(--primary); text-align: center; margin-bottom: 2rem;">Welcome Back</h1>
                
                <form action="php/login.php" method="POST">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div style="position: relative;">
                            <input type="password" name="password" id="loginPassword" class="form-input" placeholder="Enter your password" required style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                            <i class="fas fa-eye-slash" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;" onclick="
                                const pw = document.getElementById('loginPassword');
                                if(pw.type === 'password') { pw.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); }
                                else { pw.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); }
                            "></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Login As</label>
                        <select name="role" class="form-select" required>
                            <option value="">Select Role</option>
                            <option value="doctor">Doctor</option>
                            <option value="patient">Patient</option>
                            <option value="assistant">Assistant</option>
                        </select>
                    </div>
                    
                    <div id="inline-error-message" style="display: none; color: #D32F2F; margin-top: 0.5rem; margin-bottom: 0.5rem; font-size: 0.95rem; text-align: center; border: 1px solid rgba(211, 47, 47, 0.3); background-color: rgba(211, 47, 47, 0.05); padding: 0.6rem; border-radius: 8px;"></div>
                    
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
                </form>
                
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
                    Don't have an account? <a href="register.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Register</a>
                </p>
                
                <!-- <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(0,0,0,0.1);"> -->
                    <!-- <p style="text-align: center; font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">Demo Credentials:</p>
                    <div style="background: var(--secondary); padding: 1rem; border-radius: 12px; font-size: 0.85rem;">
                        <p><strong>Doctor:</strong> dr_sharma / password123</p>
                        <p><strong>Patient:</strong> patient1 / password123</p>
                        <p><strong>Assistant:</strong> assistant1 / password123</p>
                    </div> -->
                </div>
            </div>
        </div>
    </section>

    <script src="js/plugins/choices.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const roleSelect = document.querySelector('select[name="role"]');
            if (roleSelect) {
                new Choices(roleSelect, {
                    searchEnabled: false,
                    itemSelectText: '',
                    shouldSort: false,
                    position: 'bottom'
                });
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                const errorMsg = decodeURIComponent(urlParams.get('error'));
                const errorDiv = document.getElementById('inline-error-message');
                if (errorDiv) {
                    errorDiv.textContent = errorMsg;
                    errorDiv.style.display = 'block';
                }
            } else if (urlParams.has('success')) {
                showNotification(decodeURIComponent(urlParams.get('success')), 'success');
            }
            
            // Clean up the URL so the error message doesn't persist on refresh
            if (window.history && window.history.replaceState && (urlParams.has('error') || urlParams.has('success'))) {
                window.history.replaceState(null, null, window.location.pathname);
            }
        });
    </script>
</body>
</html>
