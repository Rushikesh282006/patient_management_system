<!DOCTYPE html>
<html>
<head>
    <title>Search Patient (AJAX)</title>

    <script>
        function searchPatient() {
            let name = document.getElementById("name").value;

            fetch("search_patient.php?name=" + name)
                .then(response => response.json())
                .then(data => {
                    let output = "";

                    data.forEach(p => {
                        output += `<p>${p.name} - ${p.age}</p>`;
                    });

                    document.getElementById("result").innerHTML = output;
                });
        }
    </script>

</head>

<body>

<h2>Search Patient</h2>

<input type="text" id="name" onkeyup="searchPatient()" placeholder="Enter patient name">

<div id="result"></div>

</body>
</html>
