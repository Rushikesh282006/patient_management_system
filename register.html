<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                MediCare
            </a>
            <a href="index.html" class="btn-primary" style="text-decoration: none; padding: 0.8rem 2rem;"><i class="fas fa-arrow-left"></i><span class="hide-on-mobile" style="margin-left: 0.5rem;">Back to Home</span></a>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-section">
        <div class="hero-background">
            <div class="hero-circle circle-1" data-speed="2"></div>
            <div class="hero-circle circle-2" data-speed="3"></div>
        </div>
        
        <div class="auth-wrapper register-wrapper">
            <div class="auth-card">
                <h1 style="font-family: 'Crimson Pro', serif; font-size: 2.5rem; color: var(--primary); text-align: center; margin-bottom: 2rem;">Create an Account</h1>
                
                <form action="php/register.php" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name *</label>
                            <input type="text" name="full_name" class="form-input" placeholder="John Doe" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Username *</label>
                            <input type="text" name="username" class="form-input" placeholder="johndoe123" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-input" placeholder="john@example.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Phone Number *</label>
                            <input type="tel" name="phone" class="form-input" placeholder="+1 234 567 8900" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Password *</label>
                            <input type="password" name="password" class="form-input" placeholder="Create a password" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Confirm Password *</label>
                            <input type="password" name="confirm_password" class="form-input" placeholder="Confirm your password" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Register As *</label>
                        <select name="role" class="form-select" required>
                            <option value="">Select Role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="assistant">Assistant</option>
                        </select>
                    </div>
                    
                    <!-- Only show for doctors -->
                    <div class="form-group" id="specializationGroup" style="display: none;">
                        <label class="form-label">Specialization</label>
                        <input type="text" name="specialization" class="form-input" placeholder="e.g. Cardiologist (for doctors only)">
                    </div>
                    
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Register Now</button>
                </form>
                
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
                    Already have an account? <a href="login.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Login here</a>
                </p>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        // Check for URL params indicating error or success
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                const errorMsg = urlParams.get('error');
                showNotification(errorMsg, 'error');
            } else if (urlParams.has('success')) {
                showNotification("Registration successful!", 'success');
            }
            
            // Toggle specialization field if role is doctor
            const roleSelect = document.querySelector('select[name="role"]');
            const specGroup = document.getElementById('specializationGroup');
            
            roleSelect.addEventListener('change', function() {
                if (this.value === 'doctor') {
                    specGroup.style.display = 'block';
                    specGroup.querySelector('input').required = true;
                } else {
                    specGroup.style.display = 'none';
                    specGroup.querySelector('input').required = false;
                }
            });
        });
    </script>
</body>
</html>
