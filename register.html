<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                MediCare
            </a>
            <a href="index.html" class="btn-primary" style="text-decoration: none; padding: 0.8rem 2rem;"><i class="fas fa-arrow-left"></i><span class="hide-on-mobile" style="margin-left: 0.5rem;">Back to Home</span></a>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-section">
        <div class="hero-background">
            <div class="hero-circle circle-1" data-speed="2"></div>
            <div class="hero-circle circle-2" data-speed="3"></div>
        </div>
        
        <div class="auth-wrapper register-wrapper">
            <div class="auth-card">
                <h1 style="font-family: 'Crimson Pro', serif; font-size: 2.5rem; color: var(--primary); text-align: center; margin-bottom: 2rem;">Create an Account</h1>
                
                <form action="php/register.php" method="POST" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="text" name="full_name" class="form-input" placeholder="Rushi Jagtap">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Username <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="text" name="username" class="form-input" placeholder="RushiJ">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Email <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="email" name="email" class="form-input" placeholder="name@example.com">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Phone Number <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="tel" name="phone" class="form-input" placeholder="8291251633">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Gender <span style="color:rgb(233, 23, 23)">*</span></label>
                            <select name="gender" class="form-select">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Date of Birth <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="date" name="dob" class="form-input">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Blood Group</label>
                            <select name="blood_group" class="form-select">
                                <option value="">Select Blood Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <input type="text" name="address" class="form-input" placeholder="Your Address">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Password <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="password" name="password" class="form-input" placeholder="Create a password">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Confirm Password <span style="color:rgb(233, 23, 23)">*</span></label>
                            <input type="password" name="confirm_password" class="form-input" placeholder="Confirm your password">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Register As <span style="color:rgb(233, 23, 23)">*</span></label>
                        <select name="role" class="form-select">
                            <option value="">Select Role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="assistant">Assistant</option>
                        </select>
                    </div>
                    
                    <!-- Only show for doctors -->
                    <div class="form-group" id="specializationGroup" style="display: none;">
                        <label class="form-label">Specialization</label>
                        <input type="text" name="specialization" class="form-input" placeholder="e.g. Cardiologist (for doctors only)">
                    </div>
                    
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Register Now</button>
                </form>
                
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
                    Already have an account? <a href="login.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">Login here</a>
                </p>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            // ── Helpers ──────────────────────────────────────────────────
            function showError(input, msg) {
                input.classList.add('input-error');
                let hint = input.parentElement.querySelector('.field-error-msg');
                if (!hint) {
                    hint = document.createElement('span');
                    hint.className = 'field-error-msg';
                    hint.style.cssText = 'display:block;color:#D32F2F;font-size:0.82rem;margin-top:0.3rem;';
                    input.parentElement.appendChild(hint);
                }
                hint.textContent = msg;
            }

            function clearError(input) {
                input.classList.remove('input-error');
                const hint = input.parentElement.querySelector('.field-error-msg');
                if (hint) hint.textContent = '';
            }

            function clearAllErrors() {
                form.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
                form.querySelectorAll('.field-error-msg').forEach(el => el.textContent = '');
            }

            // ── Regex patterns ────────────────────────────────────────────
            const EMAIL_RE    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const PHONE_RE    = /^[6-9]\d{9}$/;           // Indian 10-digit mobile
            const USERNAME_RE = /^[a-zA-Z0-9_]{3,20}$/;   // 3-20 alphanumeric / underscore
            const PWD_RE      = /^(?=.*[A-Za-z])(?=.*\d).{8,}$/; // min 8 chars, ≥1 letter & ≥1 digit

            // ── Form reference ────────────────────────────────────────────
            const form = document.querySelector('form[action="php/register.php"]');
            if (!form) return;

            // ── Real-time error clearing ──────────────────────────────────
            form.querySelectorAll('.form-input, .form-select').forEach(input => {
                ['input', 'change'].forEach(evt =>
                    input.addEventListener(evt, () => clearError(input))
                );
            });

            // ── Submit validation ─────────────────────────────────────────
            form.addEventListener('submit', (e) => {
                clearAllErrors();

                const get = name => form.querySelector(`[name="${name}"]`);
                let errors = [];
                let firstBad = null;

                function flag(input, msg) {
                    showError(input, msg);
                    errors.push(msg);
                    if (!firstBad) firstBad = input;
                }

                // Required empty checks
                const fullName  = get('full_name');
                const username  = get('username');
                const email     = get('email');
                const phone     = get('phone');
                const gender    = get('gender');
                const dob       = get('dob');
                const password  = get('password');
                const confirmPw = get('confirm_password');
                const role      = get('role');

                if (!fullName.value.trim())
                    flag(fullName, 'Full name is required.');

                // Username: required + format
                if (!username.value.trim()) {
                    flag(username, 'Username is required.');
                } else if (!USERNAME_RE.test(username.value.trim())) {
                    flag(username, 'Username must be 3–20 characters: letters, numbers or underscore only.');
                }

                // Email: required + format
                if (!email.value.trim()) {
                    flag(email, 'Email is required.');
                } else if (!EMAIL_RE.test(email.value.trim())) {
                    flag(email, 'Please enter a valid email address (e.g. user@example.com).');
                }

                // Phone: required + 10-digit Indian format
                if (!phone.value.trim()) {
                    flag(phone, 'Phone number is required.');
                } else if (!PHONE_RE.test(phone.value.trim())) {
                    flag(phone, 'Enter a valid 10-digit mobile number starting with 6–9.');
                }

                // Gender
                if (!gender.value)
                    flag(gender, 'Please select a gender.');

                // Date of Birth: required + not a future date
                if (!dob.value) {
                    flag(dob, 'Date of birth is required.');
                } else {
                    const dobDate = new Date(dob.value);
                    const today   = new Date();
                    today.setHours(0, 0, 0, 0);
                    if (dobDate >= today)
                        flag(dob, 'Date of birth cannot be today or a future date.');
                }

                // Password: required + strength
                if (!password.value) {
                    flag(password, 'Password is required.');
                } else if (!PWD_RE.test(password.value)) {
                    flag(password, 'Password must be at least 8 characters and include a letter and a number.');
                }

                // Confirm password: required + match (only if password itself is valid)
                if (!confirmPw.value) {
                    flag(confirmPw, 'Please confirm your password.');
                } else if (password.value && confirmPw.value !== password.value) {
                    flag(confirmPw, 'Passwords do not match.');
                }

                // Role
                if (!role.value)
                    flag(role, 'Please select a role.');

                // Specialization (only required when role = doctor)
                const specInput = form.querySelector('#specializationGroup input');
                if (role.value === 'doctor' && specInput && !specInput.value.trim())
                    flag(specInput, 'Specialization is required for doctors.');

                // ── Block submit on any error ─────────────────────────────
                if (errors.length > 0) {
                    e.preventDefault();
                    if (firstBad) firstBad.focus();
                }
            });

            // ── URL param notifications (from server-side redirects) ──────
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                showNotification(decodeURIComponent(urlParams.get('error')), 'error');
            } else if (urlParams.has('success')) {
                showNotification('Registration successful!', 'success');
            }

            // ── Toggle specialization field for doctor role ───────────────
            const roleSelect = document.querySelector('select[name="role"]');
            const specGroup  = document.getElementById('specializationGroup');

            roleSelect.addEventListener('change', function () {
                if (this.value === 'doctor') {
                    specGroup.style.display = 'block';
                    specGroup.querySelector('input').required = true;
                } else {
                    specGroup.style.display = 'none';
                    specGroup.querySelector('input').required = false;
                    clearError(specGroup.querySelector('input'));
                }
            });
        });
    </script>
</body>
</html>
