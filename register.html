<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - MediCare</title>
    <link rel="stylesheet" href="css/style.css?v=2.0" />
    <link rel="stylesheet" href="css/plugins/flatpickr.min.css" />
    <link rel="stylesheet" href="css/plugins/choices.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <div class="logo-icon">
            <i class="fas fa-heartbeat"></i>
          </div>
          MediCare
        </a>
        <a
          href="index.html"
          class="btn-primary"
          style="text-decoration: none; padding: 0.8rem 2rem"
          ><i class="fas fa-arrow-left"></i
          ><span class="hide-on-mobile" style="margin-left: 0.5rem"
            >Back to Home</span
          ></a
        >
      </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-section">
      <div class="hero-background">
        <div class="hero-circle circle-1" data-speed="2"></div>
        <div class="hero-circle circle-2" data-speed="3"></div>
      </div>

      <div class="auth-wrapper register-wrapper">
        <div class="auth-card">
          <h1
            style="
              font-family: &quot;Crimson Pro&quot;, serif;
              font-size: 2.5rem;
              color: var(--primary);
              text-align: center;
              margin-bottom: 2rem;
            "
          >
            Create an Account
          </h1>

          <form action="php/register.php" method="POST" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label"
                  >Full Name
                  <span class="required">*</span></label
                >
                <input
                  type="text"
                  name="full_name"
                  class="form-input"
                  placeholder="Rushi Jagtap"
                />
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Username
                  <span class="required">*</span></label
                >
                <input
                  type="text"
                  name="username"
                  class="form-input"
                  placeholder="RushiJ"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label"
                  >Email <span class="required">*</span></label
                >
                <input
                  type="email"
                  name="email"
                  class="form-input"
                  placeholder="name@example.com"
                />
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Phone Number
                  <span class="required">*</span></label
                >
                <input
                  type="tel"
                  name="phone"
                  class="form-input"
                  placeholder="8291251633"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label"
                  >Gender <span class="required">*</span></label
                >
                <select name="gender" class="form-select">
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Date of Birth
                  <span class="required">*</span></label
                >
                <input type="date" name="dob" class="form-input" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Blood Group</label>
                <select name="blood_group" class="form-select">
                  <option value="">Select Blood Group</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Address</label>
                <input
                  type="text"
                  name="address"
                  class="form-input"
                  placeholder="Your Address"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label"
                  >Password
                  <span class="required">*</span></label
                >
                <div style="position: relative;">
                  <input
                    type="password"
                    name="password"
                    id="regPassword1"
                    class="form-input"
                    placeholder="Create a password"
                    style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;"
                  />
                  <i class="fas fa-eye-slash" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;" onclick="
                    const pw1 = document.getElementById('regPassword1');
                    if(pw1.type === 'password') { pw1.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); }
                    else { pw1.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); }
                  "></i>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Confirm Password
                  <span class="required">*</span></label
                >
                <div style="position: relative;">
                  <input
                    type="password"
                    name="confirm_password"
                    id="regPassword2"
                    class="form-input"
                    placeholder="Confirm your password"
                    style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;"
                  />
                  <i class="fas fa-eye-slash" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;" onclick="
                    const pw2 = document.getElementById('regPassword2');
                    if(pw2.type === 'password') { pw2.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); }
                    else { pw2.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); }
                  "></i>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"
                >Register As
                <span class="required">*</span></label
              >
              <select name="role" class="form-select">
                <option value="">Select Role</option>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
                <option value="assistant">Assistant</option>
              </select>
            </div>

            <!-- Only show for doctors -->
            <div
              class="form-group"
              id="specializationGroup"
              style="display: none"
            >
              <label class="form-label">Specialization <span class="required">*</span></label>
              <input
                type="text"
                name="specialization"
                class="form-input"
                placeholder="e.g. Cardiologist (for doctors only)"
              />
            </div>

            <!-- Only show for doctors and assistants -->
            <div
              class="form-group"
              id="accessCodeGroup"
              style="display: none"
            >
              <label class="form-label">Role Access Code <span class="required">*</span></label>
              <input
                type="text"
                name="access_code"
                class="form-input"
                placeholder="Enter Staff Access Code"
              />
            </div>

            <div id="inline-error-message" style="display: none; color: #D32F2F; margin-top: 0.5rem; margin-bottom: 0.5rem; font-size: 0.95rem; text-align: center; border: 1px solid rgba(211, 47, 47, 0.3); background-color: rgba(211, 47, 47, 0.05); padding: 0.6rem; border-radius: 8px;"></div>
            
            <button
              type="submit"
              class="btn-primary"
              style="width: 100%; margin-top: 1rem"
            >
              Register Now
            </button>
          </form>

          <p
            style="
              text-align: center;
              margin-top: 1.5rem;
              color: var(--text-light);
            "
          >
            Already have an account?
            <a
              href="login.html"
              style="
                color: var(--accent);
                text-decoration: none;
                font-weight: 600;
              "
              >Login here</a
            >
          </p>
        </div>
      </div>
    </section>

    <script src="js/plugins/flatpickr.min.js"></script>
    <script src="js/plugins/choices.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
          flatpickr("input[type=date]", {
              dateFormat: "Y-m-d",
              maxDate: "today",
              disableMobile: true
          });
          const selects = document.querySelectorAll('.form-select');
          selects.forEach(select => {
              new Choices(select, {
                  searchEnabled: false,
                  itemSelectText: '',
                  shouldSort: false,
                  position: 'bottom'
              });
          });
      });
    </script>
    <script src="js/main.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
